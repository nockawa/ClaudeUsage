name: publish-nuget
on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: read
  id-token: write   # required for OIDC → NuGet Trusted Publishing

jobs:
  pack-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Derive version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Pack
        run: >
          dotnet pack ClaudeUsage.cs -c Release -o artifacts
          -p:Version=${{ steps.ver.outputs.version }}

      # Exchange the GitHub OIDC token for a short-lived (1h) NuGet API key.
      # Requires a Trusted Publishing policy on nuget.org bound to this repo + workflow file.
      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}   # your nuget.org profile name, NOT your email

      - name: Push to NuGet.org
        run: >
          dotnet nuget push "artifacts/*.nupkg"
          --api-key ${{ steps.login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
